<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff7a18"/>
      <stop offset="100%" stop-color="#e52e71"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff7a18" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#1a1208" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#09090b"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="600" cy="315" r="500" fill="url(#glow)"/>

  <!-- Logo mark -->
  <g transform="translate(500, 95) scale(2)">
    <line x1="28" y1="20" x2="28" y2="80" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>
    <g stroke="url(#grad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M 28 60 C 28 36, 45 36, 60 36 L 76 36" />
      <path d="M 60 20 L 76 36 L 60 52" />
    </g>
  </g>

  <text x="600" y="375" font-family="Georgia, serif" font-size="100" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="-2">
    hostc
  </text>
  <text x="600" y="448" font-family="system-ui, sans-serif" font-size="40" font-weight="500" fill="#a1a1aa" text-anchor="middle" letter-spacing="-0.5">
    Localhost to the edge.
  </text>
  <text x="600" y="502" font-family="system-ui, sans-serif" font-size="26" font-weight="400" fill="#52525b" text-anchor="middle">
    Powered by Cloudflare Workers
  </text>
</svg>
