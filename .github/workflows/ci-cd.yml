name: CI/CD Pipeline

on:
  push:
    branches: [master, develop, staging]
  pull_request:
    branches: [master]

jobs:
  # ============================================================
  # Job 1: 代码质量检查
  # ============================================================
  lint-and-format:
    name: 代码质量检查
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: 设置Python环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy pytest pytest-cov
      
      - name: 代码风格检查 (Black)
        run: black --check --diff .
        continue-on-error: true
      
      - name: 导入排序检查 (isort)
        run: isort --check-only --diff .
        continue-on-error: true
      
      - name: Linting (Flake8)
        run: flake8 main.py tests/ --max-line-length=120 --extend-ignore=E203,W503
        continue-on-error: true
      
      - name: 类型检查 (mypy)
        run: mypy main.py --ignore-missing-imports
        continue-on-error: true

  # ============================================================
  # Job 2: 单元测试
  # ============================================================
  unit-tests:
    name: 单元测试
    runs-on: ubuntu-latest
    needs: lint-and-format
    
    steps:
      - uses: actions/checkout@v3
      
      - name: 设置Python环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-xdist flask pydantic prometheus-client
          
      - name: 运行单元测试
        run: |
          pytest tests/test_security_fixes.py -v             --cov=main             --cov-report=term-missing             --cov-report=xml:coverage.xml             --junitxml=test-results.xml             --cov-fail-under=70
      
      - name: 上传测试覆盖率
        uses: codecov/codecov-action@v3
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ============================================================
  # Job 3: 安全扫描
  # ============================================================
  security-scan:
    name: 安全扫描
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
      - uses: actions/checkout@v3
      
      - name: 设置Python环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: 安装安全扫描工具
        run: pip install bandit safety
      
      - name: Bandit安全扫描
        run: bandit -r main.py -ll || true
      
      - name: Safety依赖漏洞检查
        run: safety check --full-report || true

  # ============================================================
  # Job 4: 构建和部署到Staging
  # ============================================================
  deploy-staging:
    name: 部署到Staging环境
    runs-on: ubuntu-latest
    needs: [unit-tests, security-scan]
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/master'
    environment: staging
    
    steps:
      - uses: actions/checkout@v3
      
      - name: 设置Python环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install gunicorn flask pydantic prometheus-client flask-restx
          
      - name: 运行健康检查（本地）
        run: |
          timeout 30s python main.py &
          sleep 10
          curl -f http://localhost:5000/health || exit 1
          curl -f http://localhost:5000/ready || exit 1
          
      - name: 部署到Staging服务器
        env:
          DEPLOY_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
        run: |
          echo "部署到Staging环境..."
          echo "主机: $STAGING_HOST"
          # 这里可以添加实际的部署命令，如rsync、docker等
